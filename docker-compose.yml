version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nirmaniq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       nirmaniq
      POSTGRES_USER:     nirmaniq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nirmaniq_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nirmaniq -d nirmaniq"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nirmaniq_backend
    restart: unless-stopped
    ports:
      - "5174:5174"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:      postgresql://nirmaniq:${POSTGRES_PASSWORD:-nirmaniq_pass}@postgres:5432/nirmaniq
      JWT_SECRET:        ${JWT_SECRET:-changeme-use-a-real-secret}
      AUTH_DEV_MODE:     ${AUTH_DEV_MODE:-true}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - ./backend/data:/app/data    # keeps nirmaniq.db available for migration

  # ── Vite frontend (dev) ─────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: nirmaniq_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_BASE_URL: http://localhost:5174
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
